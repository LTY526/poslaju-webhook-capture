name: Docker Image CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required for GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image tag
        id: vars
        run: echo "TAG=$(date +%s)" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build . \
            --file Dockerfile \
            --tag ghcr.io/lty526/poslaju-webhook-capture:latest \
            --tag ghcr.io/lty526/poslaju-webhook-capture:${{ env.TAG }}

      - name: Push image
        run: |
          docker push ghcr.io/lty526/poslaju-webhook-capture:latest
          docker push ghcr.io/lty526/poslaju-webhook-capture:${{ env.TAG }}
